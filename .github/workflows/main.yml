name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t localhost:5000/myapp:latest .

      - name: Push image
        run: |
          docker push localhost:5000/myapp:latest
