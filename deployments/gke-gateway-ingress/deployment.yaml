apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-red
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-red
  template:
    metadata:
      labels:
        app: nginx-red
    spec:
      containers:
      - name: nginx
        image: us-central1-docker.pkg.dev/<PROJECT_ID>/nginx-repo/nginx-image-red:tag1
        ports:
        - containerPort: 80
