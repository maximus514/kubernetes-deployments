stages:
  - build

variables:
  IMAGE_NAME: nginx-web-tester
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  GCP_PROJECT_ID: project-a18c5455-e17b-4297-b3e
build-and-push:
  stage: build

  image: docker:24

  services:
    - docker:24-dind

  before_script:
    - apk add --no-cache curl python3 py3-pip
    - wget https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-cli-linux-x86_64.tar.gz
    - tar -xzf google-cloud-cli-linux-x86_64.tar.gz
    - ./google-cloud-sdk/install.sh --quiet
    - export PATH=$PATH:$PWD/google-cloud-sdk/bin

    - cat "$GCP_SERVICE_KEY"
    - gcloud auth activate-service-account --key-file="$GCP_SERVICE_KEY"
    - gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

  script:
    - cd containers/nginx-web-tester

    - docker build -t us-central1-docker.pkg.dev/$GCP_PROJECT_ID/nginx-repo/$IMAGE_NAME:$IMAGE_TAG .

    - docker push us-central1-docker.pkg.dev/$GCP_PROJECT_ID/nginx-repo/$IMAGE_NAME:$IMAGE_TAG